<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="style.css"/>
  
  <script
    defer
    crossorigin="anonymous"
    src="https://grand-gorilla-82.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"
    type="text/javascript"
  ></script>

  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Z3JhbmQtZ29yaWxsYS04Mi5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://grand-gorilla-82.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
</head>
<body>

  <div class="game-container">
    <div id="startScreen">
      <h1>Flappy Bird</h1>
      <p id="playerName" class="player-name"></p>
      <div id="highScoreDisplay" class="score-display">
        <p>High Score: <span id="highScore">0</span></p>
      </div>
      <div id="difficultySelector" class="difficulty-selector">
        <p>Choose Bird Speed:</p>
        <button class="speed-btn active" data-speed="0.3" data-label="Slow">🐢 Slow</button>
        <button class="speed-btn" data-speed="0.5" data-label="Normal">🐦 Normal</button>
        <button class="speed-btn" data-speed="0.7" data-label="Fast">⚡ Fast</button>
        <button class="speed-btn" data-speed="0.9" data-label="Insane">🔥 Insane</button>
      </div>
      <button id="startBtn">Start Game</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="userDisplay" class="user-display"></div>
    <div id="score">0</div>

    <div id="gameOverScreen" class="hidden">
      <h1>Game Over</h1>
      <p id="playerNameGameOver" class="player-name"></p>
      <p id="finalScore">Score: 0</p>
      <div id="highScoreGameOver" class="score-display">
        <p>High Score: <span id="highScoreValue">0</span></p>
      </div>
      <div id="pastScoresDisplay" class="past-scores">
        <h3>Past Scores</h3>
        <ul id="pastScoresList"></ul>
      </div>
      <div id="difficultyReselector" class="difficulty-selector">
        <p>Select Bird Speed for Next Game:</p>
        <button class="speed-btn-restart active" data-speed="0.3" data-label="Slow">🐢 Slow</button>
        <button class="speed-btn-restart" data-speed="0.5" data-label="Normal">🐦 Normal</button>
        <button class="speed-btn-restart" data-speed="0.7" data-label="Fast">⚡ Fast</button>
        <button class="speed-btn-restart" data-speed="0.9" data-label="Insane">🔥 Insane</button>
      </div>
      <button id="restartBtn">Restart</button>
    </div>

  </div>

  <div id="app"></div>

  <script src="script.js"></script>

  <script>
    window.addEventListener('load', async function () {

      await Clerk.load({
        ui: { ClerkUI: window.__internal_ClerkUICtor },
      })

      const gameContainer = document.querySelector('.game-container')

      if (Clerk.isSignedIn) {
        // User is already signed in, show game
        gameContainer.classList.add('authenticated')

        document.getElementById('app').innerHTML = `
          <div style="display: flex; gap: 10px; align-items: center; justify-content: center;">
            <div id="user-button"></div>
            <button id="logoutBtn" style="padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Logout</button>
          </div>
        `

        const userButtonDiv =
          document.getElementById('user-button')

        Clerk.mountUserButton(userButtonDiv)

        // Logout button handler
        document.getElementById('logoutBtn').addEventListener('click', async function() {
          await Clerk.signOut()
          location.reload()
        })

      } else {
        // User is not signed in, show sign-in form
        document.getElementById('app').innerHTML = `
          <div id="sign-in"></div>
        `

        const signInDiv =
          document.getElementById('sign-in')

        Clerk.mountSignIn(signInDiv, {
          afterSignInUrl: window.location.href,
          redirectUrl: window.location.href
        })

        // Listen for successful sign-in
        Clerk.addListener((authentication) => {
          if (authentication.isSignedIn) {
            gameContainer.classList.add('authenticated')
            
            // Update to user button after sign-in
            document.getElementById('app').innerHTML = `
              <div style="display: flex; gap: 10px; align-items: center; justify-content: center;">
                <div id="user-button"></div>
                <button id="logoutBtn" style="padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Logout</button>
              </div>
            `
            const userButtonDiv = document.getElementById('user-button')
            Clerk.mountUserButton(userButtonDiv)

            // Logout button handler
            document.getElementById('logoutBtn').addEventListener('click', async function() {
              await Clerk.signOut()
              location.reload()
            })
          }
        })
      }
    })
  </script>
</body>
</html>
